services:
  mysql:
    image: mysql:8.4
    container_name: sopt-assignment-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sopt_assignment
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
